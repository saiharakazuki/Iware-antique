<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>IWARE antique</title>
    <meta name="theme-color" content="#080808" />
    <meta name="apple-mobile-web-app-title" content="IWARE" />
    <meta name="application-name" content="IWARE" />
    <link rel="apple-touch-icon" href="./assets/iware-icon-180.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-32.png" />
    <link rel="icon" type="image/svg+xml" href="./assets/iware-icon.svg" />
    <link rel="manifest" href="./site.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="app-header">
      <button class="brand-mark" id="homeButton" type="button" aria-label="トップへ戻る">AZ</button>
      <div class="header-copy">
        <p class="eyebrow">Private antique desk</p>
        <h1>IWARE antique</h1>
      </div>
    </header>

    <main>
      <section class="home-screen" id="topScreen">
        <section class="progress-panel" aria-label="進捗状況">
          <div class="progress-head">
            <p class="section-kicker">Progress</p>
            <span>確認すると薄くなります</span>
          </div>
          <div class="progress-grid">
            <button class="progress-card" data-screen="pricing" id="progressPricingCard" type="button">
              <span>金額待ち</span>
              <strong id="progressPricingCount">0</strong>
              <small>Akira pricing</small>
            </button>
            <button class="progress-card" data-screen="received" id="progressReviewCard" type="button">
              <span>価格到着</span>
              <strong id="progressReviewCount">0</strong>
              <small>Review</small>
            </button>
            <button class="progress-card" data-screen="inventory" id="progressStockCard" type="button">
              <span>在庫写真</span>
              <strong id="progressStockCount">0</strong>
              <small>Stock</small>
            </button>
          </div>
        </section>
        <button class="home-card primary-card" data-screen="inventory" type="button">
          <span class="home-index">1</span>
          <span class="card-icon">LIST</span>
          <strong>在庫管理リスト</strong>
          <small>倉庫別・カテゴリ別</small>
          <em id="stockStatus">Stock list</em>
        </button>
        <button class="home-card" data-screen="home" type="button">
          <span class="home-index">2</span>
          <span class="card-icon">UP</span>
          <strong>Upload</strong>
          <small>写真を入れる</small>
          <em>Photo desk</em>
        </button>
      </section>

      <section class="home-screen" id="homeScreen" hidden>
        <button class="home-card" data-screen="upload" type="button">
          <span class="home-index">1</span>
          <strong>Upload</strong>
          <small>写真を入れる</small>
          <em>Photographer</em>
        </button>
        <button class="home-card" data-screen="pricing" type="button">
          <span class="home-index">2</span>
          <strong>Pricing</strong>
          <small>金額を入れる</small>
          <em id="pricingStatus">待機中</em>
        </button>
        <button class="home-card" data-screen="received" type="button">
          <span class="home-index">3</span>
          <strong>Review</strong>
          <small>価格を見る</small>
          <em id="receivedStatus">通知なし</em>
        </button>
      </section>

      <section class="screen-panel" id="uploadScreen" hidden>
        <div class="screen-head">
          <div class="screen-actions">
            <button class="back-button" data-screen="top" type="button">戻る</button>
            <button class="back-button" data-screen="inventory" type="button">在庫管理リスト</button>
          </div>
          <div>
            <p class="section-kicker">01 Photo Upload</p>
            <h2>Upload</h2>
          </div>
        </div>
        <label class="upload-box">
          <span class="upload-title">Select photos</span>
          <span class="upload-sub">写真をまとめて追加</span>
          <input id="photoInput" type="file" accept="image/*" multiple />
        </label>
        <p class="upload-feedback" id="uploadFeedback" hidden></p>
        <div class="upload-actions upload-route-panel" id="uploadActions" hidden>
          <label class="select-label">
            <span>写真の行き先</span>
            <select class="stock-select" id="uploadRouteSelect">
              <option value="pricing">アキラ君に金額を付けてもらう</option>
              <option value="タジミ倉庫">タジミ倉庫</option>
              <option value="香川1">香川1</option>
              <option value="香川2">香川2</option>
              <option value="香川3">香川3</option>
              <option value="香川4">香川4</option>
              <option value="香川5">香川5</option>
              <option value="その他倉庫">その他倉庫</option>
            </select>
          </label>
          <button class="complete-button" id="routeConfirmButton" type="button">進む</button>
        </div>
        <section class="destination-panel" id="stockDestinationPanel" hidden>
          <p class="section-kicker">Stock destination</p>
          <h3>どこの在庫表に入れますか</h3>
          <div class="warehouse-grid" id="warehouseGrid"></div>
          <div class="category-grid" id="categoryGrid" hidden></div>
        </section>
        <button class="complete-button" id="uploadCompleteButton" type="button" hidden>完了</button>
        <section class="thumbnail-strip" id="uploadPreview" aria-live="polite"></section>
      </section>

      <section class="screen-panel" id="inventoryScreen" hidden>
        <div class="screen-head">
          <button class="back-button" data-screen="top" type="button">戻る</button>
          <div>
            <p class="section-kicker">Warehouse stock</p>
            <h2>在庫管理リスト</h2>
          </div>
        </div>
        <section class="warehouse-grid" id="inventoryWarehouseGrid"></section>
        <section class="category-grid" id="inventoryCategoryGrid"></section>
        <section class="item-grid stock-grid" id="inventoryGrid" aria-live="polite"></section>
      </section>

      <section class="screen-panel" id="pricingScreen" hidden>
        <div class="screen-head">
          <button class="back-button" data-screen="home" type="button">戻る</button>
          <div>
            <p class="section-kicker">02 Akira Pricing</p>
            <h2>Set prices</h2>
          </div>
        </div>
        <button class="send-all-button" id="sendAllButton" type="button">完了</button>
        <p class="send-feedback" id="sendFeedback" hidden></p>
        <section class="item-grid" id="pricingGrid" aria-live="polite"></section>
      </section>

      <section class="screen-panel" id="receivedScreen" hidden>
        <div class="screen-head">
          <button class="back-button" data-screen="home" type="button">戻る</button>
          <div>
            <p class="section-kicker">03 Price Notice</p>
            <h2>Review</h2>
          </div>
        </div>
        <section class="notice-bar" id="noticeBar" hidden>
          <span class="notice-dot"></span>
          <p>価格指示が届いています。</p>
        </section>
        <button class="clear-button" id="clearReceivedButton" type="button">完了</button>
        <p class="review-feedback" id="reviewFeedback" hidden></p>
        <section class="item-grid" id="receivedGrid" aria-live="polite"></section>
      </section>

      <template id="photoTemplate">
        <article class="item-card">
          <figure class="photo-frame">
            <img alt="" />
          </figure>
          <div class="item-body">
            <div class="item-title-row">
              <h3></h3>
              <span class="status-badge"></span>
            </div>
            <div class="price-row">
              <label>
                金額
                <input class="price-input" type="number" inputmode="numeric" min="0" step="100" placeholder="128000" />
              </label>
              <button class="send-price-button" type="button">送る</button>
            </div>
            <div class="received-price"></div>
            <label class="review-check">
              <input class="review-checkbox" type="checkbox" />
              <span>完了</span>
            </label>
            <div class="stock-row">
              <time></time>
              <button class="delete-button" type="button">削除</button>
            </div>
          </div>
        </article>
      </template>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./config.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
